services:
  - type: web
    name: stok-gudang
    runtime: node
    region: singapore
    plan: free
    buildCommand: >
      npm install -g pnpm &&
      pnpm install &&
      BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/stok-gudang run build &&
      cp -r artifacts/stok-gudang/dist/public artifacts/api-server/public &&
      pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_STATIC
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: stok-gudang-db
          property: connectionString

databases:
  - name: stok-gudang-db
    databaseName: stok_gudang
    plan: free
    region: singapore
